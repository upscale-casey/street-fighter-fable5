<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kazan Duel">
<meta name="theme-color" content="#0a0a0a">
<title>KAZAN DUEL</title>
<style>
html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#0a0a0a; overscroll-behavior:none; }
canvas { position:fixed; inset:0; display:block; touch-action:none; }
html { -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent; -webkit-text-size-adjust:100%; }
#rotate-overlay { position:fixed; inset:0; background:#191919; color:#FEFFEA; display:none;
  flex-direction:column; align-items:center; justify-content:center; z-index:40;
  font:20px -apple-system, system-ui, sans-serif; text-align:center; }
#rotate-overlay .glyph { font-size:64px; margin-bottom:18px; transform:rotate(90deg); }
#touch-controls { position:fixed; inset:0; pointer-events:none; z-index:20; display:none; }
#touch-controls.on { display:block; }
/* §18.5 touch restyle — CSS only: dark plates + per-button accent borders
   (LP/LK gold, HP/HK ember, SP1/SP2 teal). Ids, geometry, hit areas, and
   visibility rules are untouched (all still set by layoutTouch() in JS). */
.tbtn { position:fixed; pointer-events:auto; touch-action:none; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font:bold 18px -apple-system, system-ui, sans-serif; color:#ffd23e;
  border:2px solid #ffd23e; background:rgba(12,12,16,0.55); box-sizing:border-box; }
#btn-hp, #btn-hk { color:#ff7a2e; border-color:#ff7a2e; }
.tbtn.pressed { background:rgba(255,210,62,0.32); transform:scale(0.92); border-width:4px; }
#btn-hp.pressed, #btn-hk.pressed { background:rgba(255,122,46,0.32); }
.tbtn.sp { border-color:#34e0c8; color:#34e0c8; background:rgba(12,12,16,0.55); }
.tbtn.sp.pressed { background:rgba(52,224,200,0.32); }
#dpad { position:fixed; pointer-events:auto; touch-action:none; border-radius:50%;
  border:3px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.05); box-sizing:border-box; }
#dpad-knob { position:absolute; border-radius:50%; background:rgba(255,255,255,0.35);
  left:50%; top:50%; transform:translate(-50%,-50%); pointer-events:none; }
#dpad-knob.live { background:rgba(255,255,255,0.55); }
#btn-pause { position:fixed; pointer-events:auto; touch-action:none; width:44px; height:44px;
  border-radius:8px; border:2px solid rgba(254,255,234,0.3); color:rgba(254,255,234,0.55);
  background:rgba(25,25,25,0.3); display:flex; align-items:center; justify-content:center;
  font:bold 14px -apple-system, system-ui, sans-serif; box-sizing:border-box; letter-spacing:2px; }
#sa-probe { position:fixed; left:0; top:0; width:0; height:0; visibility:hidden; pointer-events:none;
  padding-top:env(safe-area-inset-top); padding-right:env(safe-area-inset-right);
  padding-bottom:env(safe-area-inset-bottom); padding-left:env(safe-area-inset-left); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="sa-probe"></div>
<div id="rotate-overlay"><div class="glyph">&#9634;</div><div>ROTATE YOUR DEVICE</div></div>
<div id="touch-controls">
  <div id="dpad"><div id="dpad-knob"></div></div>
  <div id="btn-lp" class="tbtn">LP</div>
  <div id="btn-hp" class="tbtn">HP</div>
  <div id="btn-lk" class="tbtn">LK</div>
  <div id="btn-hk" class="tbtn">HK</div>
  <div id="btn-sp1" class="tbtn sp">SP</div>
  <div id="btn-sp2" class="tbtn sp">SP</div>
  <div id="btn-pause">&#10074;&#10074;</div>
</div>
<script>
'use strict';
/* ============================================================================
   KAZAN DUEL — single-file 1v1 fighting game.
   Section banners follow DESIGN.md numbering.
   ========================================================================== */

/* ===================== §1 CONVENTIONS / UTILS ===================== */
var GAME_W = 1280, GAME_H = 720, GROUND = 620, MAXHP = 1000, STEP = 1000 / 60;
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function lerp(a, b, t) { return a + (b - a) * t; }
function alerp(a, b, t) { var d = ((b - a + 540) % 360) - 180; return a + d * t; }
function mulberry32(seed) {
  var s = seed >>> 0;
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
var EASE = {
  linear: function (t) { return t; },
  outQuad: function (t) { return t * (2 - t); },
  inQuad: function (t) { return t * t; },
  outBack: function (t) { var c = 1.70158; var u = t - 1; return 1 + (c + 1) * u * u * u + c * u * u; },
  snap: function (t) { return 1; }
};

/* ===================== §2 PLATFORM LAYER ===================== */
var cvs = document.getElementById('game');
var ctx = cvs.getContext('2d');
var vw = 0, vh = 0, dpr = 1, scale = 1, ox = 0, oy = 0;
var safe = { t: 0, r: 0, b: 0, l: 0 };
var dprForced = 0; // degradation valve: when set, force dpr
var saProbe = document.getElementById('sa-probe');
var rotateOverlay = document.getElementById('rotate-overlay');
var stageDirty = true;

function touchCapable() {
  return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}

function readSafeArea() {
  try {
    var cs = getComputedStyle(saProbe);
    safe.t = parseFloat(cs.paddingTop) || 0;
    safe.r = parseFloat(cs.paddingRight) || 0;
    safe.b = parseFloat(cs.paddingBottom) || 0;
    safe.l = parseFloat(cs.paddingLeft) || 0;
  } catch (e) { safe.t = safe.r = safe.b = safe.l = 0; }
}

function relayout() {
  vw = window.innerWidth; vh = window.innerHeight;
  if (vw < 1) vw = 1; if (vh < 1) vh = 1;
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  // §12.1 fill-rate budget: keep the backing store ≤ 2.4 MP. A fixed 1.5
  // fallback still exceeds the cap on 12.9" iPads, so compute the clamp
  // (never above the spec's 1.5 fallback, floor 1).
  if (vw * dpr * vh * dpr > 2400000) {
    dpr = Math.max(1, Math.min(1.5, Math.sqrt(2400000 / (vw * vh))));
  }
  if (dprForced) dpr = dprForced;
  cvs.width = Math.floor(vw * dpr);
  cvs.height = Math.floor(vh * dpr);
  cvs.style.width = vw + 'px';
  cvs.style.height = vh + 'px';
  scale = Math.min(vw / GAME_W, vh / GAME_H);
  ox = Math.floor((vw - GAME_W * scale) / 2);
  oy = Math.floor((vh - GAME_H * scale) / 2);
  readSafeArea();
  stageDirty = true;
  layoutTouch();
  updateRotateOverlay();
}

var relayoutTimer = 0;
function scheduleRelayout(extraDelay) {
  clearTimeout(relayoutTimer);
  relayoutTimer = setTimeout(relayout, 150);
  if (extraDelay) setTimeout(relayout, 400);
}
window.addEventListener('resize', function () { scheduleRelayout(false); });
window.addEventListener('orientationchange', function () { scheduleRelayout(true); });
if (window.visualViewport) window.visualViewport.addEventListener('resize', function () { scheduleRelayout(false); });

var rotateWasNarrow = false;
function updateRotateOverlay() {
  var coarse = false;
  try { coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches; } catch (e) {}
  // Narrow portrait coarse-pointer window (min dimension < 500): auto-pause.
  // iPad full-screen portrait stays playable (testing contract).
  var narrow = coarse && vh > vw && Math.min(vw, vh) < 500;
  // Show "ROTATE YOUR DEVICE" only where rotating helps: phone-sized SCREENS.
  // An iPad Slide Over / Split View window stays narrow after rotating, so it
  // just pauses without the misleading prompt.
  var phoneScreen = true;
  try {
    if (window.screen && screen.width && screen.height) {
      phoneScreen = Math.min(screen.width, screen.height) < 500;
    }
  } catch (e) {}
  rotateOverlay.style.display = (narrow && phoneScreen) ? 'flex' : 'none';
  if (narrow && !rotateWasNarrow) requestPause();
  else if (!narrow && rotateWasNarrow) { audioRewake(); musicRewake(); }
  rotateWasNarrow = narrow;
}

/* §2.4 gesture suppression */
['touchstart', 'touchmove', 'touchend', 'touchcancel'].forEach(function (ev) {
  cvs.addEventListener(ev, function (e) { e.preventDefault(); }, { passive: false });
});
['gesturestart', 'gesturechange', 'gestureend'].forEach(function (ev) {
  document.addEventListener(ev, function (e) { e.preventDefault(); }, { passive: false });
});
document.addEventListener('contextmenu', function (e) { e.preventDefault(); });

/* §2.6 lifecycle pause (system-initiated). Unconditional: audio suspends and
   the music scheduler stops on every scene, not just mid-fight; the fight
   additionally freezes and stays paused until explicit unpause. */
function requestPause() {
  // stuck-input hygiene: keyup/pointerup may never arrive once we're hidden
  kbHeld.left = kbHeld.right = kbHeld.up = kbHeld.down = false;
  dpadReset();
  // pending edge presses must not survive the background period: a press in
  // the final tick before hiding would auto-unpause the fight on return
  // (DESIGN §2.6: explicit unpause required)
  clearEdges();
  if (G.scene === 'fight' && !G.paused) { G.paused = true; G.pauseIdx = 0; pauseSnapPrev(); }
  musicStop();
  if (AC && AC.state === 'running') { try { AC.suspend(); } catch (e) {} }
}
/* restart the appropriate music loop on return (fight music only when the
   player explicitly resumes; menus/victory restart immediately) */
function musicRewake() {
  if (MUS.on || document.hidden || !AC) return;
  if (G.scene === 'fight') { if (!G.paused) musicStart(true); }
  else musicStart(false);
}
document.addEventListener('visibilitychange', function () {
  if (document.hidden) { requestPause(); }
  else { audioRewake(); musicRewake(); lastNow = performance.now(); }
});
window.addEventListener('blur', function () { requestPause(); });
window.addEventListener('pagehide', function () { requestPause(); });
window.addEventListener('pageshow', function () { audioRewake(); musicRewake(); lastNow = performance.now(); });
window.addEventListener('focus', function () { audioRewake(); musicRewake(); });

/* ===================== §10 AUDIO (WebAudio synth) ===================== */
var AC = null, masterGain = null, sfxBus = null, musicBus = null, noiseBuf = null;
var muted = false;
try { muted = localStorage.getItem('kd_mute') === '1'; } catch (e) {}
var voices = [];

function unlockAudio() {
  if (!AC) {
    try {
      var C = window.AudioContext || window.webkitAudioContext;
      if (!C) return;
      AC = new C({ latencyHint: 'interactive' });
      var comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.ratio.value = 4;
      comp.connect(AC.destination);
      masterGain = AC.createGain();
      masterGain.gain.value = muted ? 0 : 0.9;
      masterGain.connect(comp);
      sfxBus = AC.createGain(); sfxBus.gain.value = 1.0; sfxBus.connect(masterGain);
      musicBus = AC.createGain(); musicBus.gain.value = 0.28; musicBus.connect(masterGain);
      // 1 s reusable white-noise buffer
      noiseBuf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
      var d = noiseBuf.getChannelData(0);
      for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      // silent 1-frame buffer to complete the unlock
      var sb = AC.createBuffer(1, 1, AC.sampleRate);
      var src = AC.createBufferSource(); src.buffer = sb; src.connect(AC.destination); src.start(0);
    } catch (e) { AC = null; }
  } else if (AC.state !== 'running') {
    try { AC.resume(); } catch (e) {}
  }
}
function audioRewake() {
  if (AC && AC.state !== 'running' && !(G.paused && G.scene === 'fight')) {
    try { AC.resume(); } catch (e) {}
  }
}
function setMuted(m) {
  muted = m;
  try { localStorage.setItem('kd_mute', m ? '1' : '0'); } catch (e) {}
  if (AC && masterGain) {
    var t = AC.currentTime;
    try {
      masterGain.gain.cancelScheduledValues(t);
      masterGain.gain.setValueAtTime(masterGain.gain.value, t);
      masterGain.gain.linearRampToValueAtTime(m ? 0 : 0.9, t + 0.03);
    } catch (e) {}
  }
}
function voiceAdd(node, stopAt) {
  voices.push({ n: node, s: stopAt });
  if (voices.length > 10) {
    var v = voices.shift();
    try { v.n.disconnect(); } catch (e) {}
  }
  var now = AC ? AC.currentTime : 0;
  for (var i = voices.length - 1; i >= 0; i--) if (voices[i].s < now) voices.splice(i, 1);
}
function tone(type, f0, f1, dur, peak, att) {
  if (!AC || AC.state !== 'running') return;
  try {
    var t0 = AC.currentTime;
    var o = AC.createOscillator(); o.type = type;
    o.frequency.setValueAtTime(f0, t0);
    if (f1 !== f0) o.frequency.linearRampToValueAtTime(Math.max(1, f1), t0 + dur);
    var g = AC.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peak, t0 + (att || 0.005));
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(sfxBus);
    o.start(t0); o.stop(t0 + dur + 0.02);
    voiceAdd(g, t0 + dur + 0.02);
  } catch (e) {}
}
function noiseSfx(dur, peak, ftype, f0, f1, q, att, delay) {
  if (!AC || AC.state !== 'running') return;
  try {
    var t0 = AC.currentTime + (delay || 0);
    var src = AC.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
    var f = AC.createBiquadFilter(); f.type = ftype || 'bandpass';
    f.frequency.setValueAtTime(f0, t0);
    if (f1 && f1 !== f0) f.frequency.linearRampToValueAtTime(f1, t0 + dur);
    f.Q.value = q || 1;
    var g = AC.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peak, t0 + (att || 0.005));
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(f); f.connect(g); g.connect(sfxBus);
    src.start(t0); src.stop(t0 + dur + 0.02);
    voiceAdd(g, t0 + dur + 0.02);
  } catch (e) {}
}
var S = {
  whiff: function () { noiseSfx(0.09, 0.18, 'bandpass', 1400, 500, 1.2); },
  hitL: function () { tone('square', 190, 70, 0.07, 0.3); noiseSfx(0.045, 0.22, 'lowpass', 900, 900, 1); },
  hitH: function () { tone('square', 130, 45, 0.13, 0.35); tone('sine', 55, 55, 0.14, 0.3); noiseSfx(0.07, 0.2, 'lowpass', 700, 700, 1); },
  block: function () { tone('triangle', 900, 900, 0.045, 0.2); noiseSfx(0.025, 0.15, 'highpass', 3000, 3000, 1); },
  jump: function () { tone('sine', 280, 620, 0.11, 0.15); },
  land: function () { noiseSfx(0.06, 0.14, 'lowpass', 400, 400, 1); },
  ember: function () { tone('sawtooth', 240, 100, 0.26, 0.28); noiseSfx(0.26, 0.14, 'lowpass', 2200, 300, 1); },
  splitter: function () { tone('sawtooth', 150, 700, 0.24, 0.26); tone('square', 300, 1400, 0.24, 0.13); },
  cyclone: function () { noiseSfx(0.14, 0.2, 'bandpass', 900, 350, 1.2); },
  /* §15.3 roster specials */
  voltrush: function () { noiseSfx(0.14, 0.2, 'bandpass', 1260, 490, 1.2); tone('square', 1200, 300, 0.06, 0.18); },
  thunderspike: function () { tone('sawtooth', 180, 840, 0.24, 0.26); tone('square', 360, 1680, 0.24, 0.13); noiseSfx(0.08, 0.15, 'highpass', 3000, 3000, 1.5); },
  faultline: function () { tone('sine', 70, 70, 0.2, 0.3); noiseSfx(0.2, 0.18, 'lowpass', 300, 150, 1); },
  lariat: function () { noiseSfx(0.13, 0.22, 'bandpass', 1000, 300, 1.3); },
  clank: function () { tone('triangle', 1800, 1800, 0.04, 0.2); },
  veilarrow: function () { tone('sawtooth', 320, 160, 0.14, 0.28); noiseSfx(0.14, 0.14, 'lowpass', 2200, 300, 1); },
  risingveil: function () { tone('sawtooth', 100, 500, 0.18, 0.26); },
  uiMove: function () { tone('square', 440, 440, 0.03, 0.12); },
  uiConfirm: function () { tone('square', 660, 660, 0.07, 0.15); },
  uiTick: function () { tone('square', 520, 520, 0.012, 0.06); },
  timer: function () { tone('square', 990, 990, 0.025, 0.1); },
  ko: function () {
    tone('sine', 60, 60, 0.55, 0.4);
    tone('sawtooth', 300, 50, 0.45, 0.3);
    noiseSfx(0.42, 0.3, 'bandpass', 800, 800, 1, 0.005, 0.03);
  },
  card: function () {
    tone('square', 660, 660, 0.09, 0.16);
    if (AC && AC.state === 'running') {
      setTimeout(function () { tone('square', 660, 660, 0.09, 0.16); }, 140);
      setTimeout(function () { tone('square', 880, 880, 0.22, 0.16); }, 300);
    }
  },
  sting: function () {
    tone('square', 440, 440, 0.12, 0.2);
    setTimeout(function () { tone('square', 523.25, 523.25, 0.12, 0.2); }, 130);
    setTimeout(function () { tone('square', 659.25, 659.25, 0.24, 0.2); }, 260);
  }
};

/* §10.3 music — 126 BPM, 2-bar loop, lookahead scheduler */
var MUS = { on: false, lead: true, iv: 0, step: 0, nextT: 0 };
var SPB16 = 60 / 126 / 4;
var BASSLINE = [55, 55, 0, 55, 65.41, 0, 55, 0, 49, 49, 0, 49, 61.74, 0, 82.41, 73.42];
var LEADLINE = [329.63, 392, 440, 0, 523.25, 440, 392, 329.63];
function musicNote(step, t) {
  try {
    if (step % 4 === 0) { // kick
      var o = AC.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(130, t); o.frequency.exponentialRampToValueAtTime(45, t + 0.11);
      var g = AC.createGain();
      g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
      o.connect(g); g.connect(musicBus); o.start(t); o.stop(t + 0.15);
    }
    if (step % 2 === 0) { // hats
      var hs = AC.createBufferSource(); hs.buffer = noiseBuf; hs.loop = true;
      var hf = AC.createBiquadFilter(); hf.type = 'highpass'; hf.frequency.value = 6500;
      var hg = AC.createGain();
      var pk = (step % 4 === 2) ? 0.16 : 0.08;
      hg.gain.setValueAtTime(pk, t); hg.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
      hs.connect(hf); hf.connect(hg); hg.connect(musicBus); hs.start(t); hs.stop(t + 0.04);
    }
    if (step % 2 === 0) { // bass (8th notes)
      var bn = BASSLINE[(step >> 1) % 16];
      if (bn > 0) {
        var b = AC.createOscillator(); b.type = 'triangle'; b.frequency.value = bn;
        var bg = AC.createGain();
        bg.gain.setValueAtTime(0.001, t); bg.gain.linearRampToValueAtTime(0.32, t + 0.01);
        bg.gain.exponentialRampToValueAtTime(0.001, t + SPB16 * 1.9);
        b.connect(bg); bg.connect(musicBus); b.start(t); b.stop(t + SPB16 * 2);
      }
    }
    if (MUS.lead && step >= 16 && step % 2 === 0) { // sparse lead on bar 2
      var ln = LEADLINE[((step - 16) >> 1) % 8];
      if (ln > 0) {
        var l = AC.createOscillator(); l.type = 'square'; l.frequency.value = ln;
        var lf = AC.createBiquadFilter(); lf.type = 'lowpass'; lf.frequency.value = 1800;
        var lg = AC.createGain();
        lg.gain.setValueAtTime(0.001, t); lg.gain.linearRampToValueAtTime(0.11, t + 0.01);
        lg.gain.exponentialRampToValueAtTime(0.001, t + SPB16 * 1.8);
        l.connect(lf); lf.connect(lg); lg.connect(musicBus); l.start(t); l.stop(t + SPB16 * 2);
      }
    }
  } catch (e) {}
}
function musicSchedule() {
  if (!AC || AC.state !== 'running') return;
  while (MUS.nextT < AC.currentTime + 0.12) {
    musicNote(MUS.step, MUS.nextT);
    MUS.step = (MUS.step + 1) % 32;
    MUS.nextT += SPB16;
  }
}
function musicStart(lead) {
  musicStop();
  if (!AC) return;
  MUS.on = true; MUS.lead = lead; MUS.step = 0;
  MUS.nextT = AC.currentTime + 0.06;
  MUS.iv = setInterval(musicSchedule, 25);
}
function musicStop() {
  MUS.on = false;
  if (MUS.iv) { clearInterval(MUS.iv); MUS.iv = 0; }
}

/* ===================== §8 CONTROLS — abstract input ===================== */
var KEYMAP = {
  ArrowLeft: 'left', KeyA: 'left', ArrowRight: 'right', KeyD: 'right',
  ArrowUp: 'up', KeyW: 'up', ArrowDown: 'down', KeyS: 'down',
  KeyU: 'lp', KeyI: 'hp', KeyJ: 'lk', KeyK: 'hk',
  KeyO: 'sp', Space: 'sp',
  Escape: 'pause', KeyP: 'pause', Enter: 'confirm', KeyM: 'mute'
};
var kbHeld = { left: false, right: false, up: false, down: false };
var EDGE = {
  left: false, right: false, up: false, down: false,
  lp: false, hp: false, lk: false, hk: false, sp: false,
  confirm: false, pause: false, mute: false, any: false
};
var menuTap = null;       // {x,y} in CSS px, consumed per tick
var lastKeyTime = -1e9;   // for touch-control auto-hide
var lastTouchTime = 0;
var prevHeldUp = false;

window.addEventListener('keydown', function (e) {
  var a = KEYMAP[e.code];
  if (!a) return;
  e.preventDefault();
  unlockAudio();
  lastKeyTime = performance.now();
  updateTouchVisibility();
  if (a === 'left' || a === 'right' || a === 'up' || a === 'down') {
    if (!e.repeat) { EDGE[a] = true; EDGE.any = true; }
    kbHeld[a] = true;
  } else {
    if (e.repeat) return;
    EDGE[a] = true;
    if (a !== 'pause' && a !== 'mute') EDGE.any = true;
  }
});
window.addEventListener('keyup', function (e) {
  var a = KEYMAP[e.code];
  if (!a) return;
  e.preventDefault();
  if (kbHeld.hasOwnProperty(a)) kbHeld[a] = false;
});

/* §8.2 touch — DOM controls (ids per TESTING.md) */
var tcEl = document.getElementById('touch-controls');
var dpadEl = document.getElementById('dpad');
var knobEl = document.getElementById('dpad-knob');

function dpadApply(dx, dy) {
  var d = Math.sqrt(dx * dx + dy * dy);
  var kx = 0, ky = 0;
  if (d > dpadDead) {
    var lim = dpadRadius * 0.55;
    var f = Math.min(d, lim) / d;
    kx = dx * f; ky = dy * f;
    var ang = Math.atan2(dy, dx) * 180 / Math.PI; // 0=E, 90=S (y down)
    if (ang < 0) ang += 360;
    var sec = Math.round(ang / 45) % 8;
    if (dpadSector >= 0 && sec !== dpadSector) {
      var center = dpadSector * 45;
      var diff = Math.abs(((ang - center + 540) % 360) - 180);
      if (diff < 22.5 + 6) sec = dpadSector; // 6° hysteresis
    }
    dpadSector = sec;
  } else {
    dpadSector = -1;
  }
  touchIn.left = dpadSector === 3 || dpadSector === 4 || dpadSector === 5;
  touchIn.right = dpadSector === 7 || dpadSector === 0 || dpadSector === 1;
  touchIn.down = dpadSector === 1 || dpadSector === 2 || dpadSector === 3;
  touchIn.up = dpadSector === 5 || dpadSector === 6 || dpadSector === 7;
  knobEl.style.marginLeft = kx + 'px'; knobEl.style.marginTop = ky + 'px';
  knobEl.classList.toggle('live', dpadSector >= 0);
}
function dpadReset() {

}

    e.preventDefault();

function bindBtn(id, action) {
  var el = document.getElementById(id);
  var press = function (e) {
    e.preventDefault(); unlockAudio(); markTouch();
    el.classList.add('pressed');
    EDGE[action] = true;
    if (action !== 'pause') EDGE.any = true;
    S.uiTick();
  };
  var release = function (e) { if (e) e.preventDefault(); el.classList.remove('pressed'); };
  if (hasPE) {
    el.addEventListener('pointerdown', press);
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('pointerleave', release);
  } else {
    el.addEventListener('touchstart', press, { passive: false });
    el.addEventListener('touchend', release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
  }
  el.addEventListener('mousedown', function (e) { if (!hasPE) press(e); });

}

function render(alpha) {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, vw, vh);
  if (stageDirty) bakeStage();
  var F = G.fight;
  var shx = 0, shy = 0;
  if (F && F.shake > 0.3 && G.scene === 'fight' && !G.paused) {
    shx = (Math.random() * 2 - 1) * F.shake;
    shy = (Math.random() * 2 - 1) * F.shake * 0.6;
  }
  ctx.save();
  ctx.translate(ox + shx * scale, oy + shy * scale);
  ctx.scale(scale, scale);
  // §18.3 punch-zoom: a 3 f world-transform pop to 1.03 anchored at the
  // contact point, carrying prev/current values through render(alpha) like
  // every other interpolated quantity.
  if (F) {
    var zoomNow = lerp(F.zoomPrev, F.zoom, alpha);
    if (Math.abs(zoomNow - 1) > 0.0005) {
      ctx.translate(F.zoomCX, F.zoomCY);
      ctx.scale(zoomNow, zoomNow);
      ctx.translate(-F.zoomCX, -F.zoomCY);
    }
  }
  ctx.beginPath(); ctx.rect(0, 0, GAME_W, GAME_H); ctx.clip();
  // §17.2 parallax: shift is driven by the fighters' interpolated midpoint x
  // (0 with no fighters on screen, e.g. title/select); stageT is a tick
  // counter that freezes correctly on pause (F.frame only advances in
  // fightTick, never in pauseTick) instead of the free-running G.titleT.
  var stageT = F ? F.frame : G.titleT;
  var midX = F ? (lerp(F.p1.px, F.p1.x, alpha) + lerp(F.p2.px, F.p2.x, alpha)) / 2 : 640;
  var shift = clamp((midX - 640) / 640, -1, 1);
  STAGE_ALPHA = alpha;
  drawActiveStage(stageT, shift);
  if ((G.scene === 'fight' || G.scene === 'victory') && F) {
    drawShadow(F.p1, alpha); drawShadow(F.p2, alpha);
    for (var i = 0; i < F.projs.length; i++) drawProj(F.projs[i], alpha);
    drawFighterAfterimages(F.p1); drawFighterAfterimages(F.p2);
    drawFighter(F.p1, alpha);
    drawFighter(F.p2, alpha);
    drawParticles(alpha);
    // §18.3 KO drama: flat dark overlay once the KO slow-mo/flash has
    // settled, winner re-drawn on top with rim-light emphasis.
    if (F.phase === 'end' && F.result && F.result.winner >= 0 && F.pt > 6) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
      drawFighter(F.result.winner === 0 ? F.p1 : F.p2, alpha, 2.4);
    }
    if (G.debugBoxes) drawDebugBoxes(F);
  } else if (G.scene === 'title' && prevKazan) {
    // title-screen background preview (§16: the select scene now draws its
    // own card/panel/VS-banner fighters entirely inside drawSelect(), in HUD
    // space, so it no longer touches this world-space branch at all).
    prevKazan.t = G.titleT; prevVolt.t = G.titleT + 20;
    fighterPose(prevKazan, 0, SCRATCH_A);
    drawFighterAt(420, GROUND, 1, PAL.kazan, SCRATCH_A, 0, false);
    fighterPose(prevVolt, 0, SCRATCH_B);
    drawFighterAt(860, GROUND, -1, PAL.volt, SCRATCH_B, 0, false);
  }
  ctx.restore();
  drawHUD(alpha, shx, shy);
  if (F && F.flash > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + (F.flash === 2 ? 0.7 : 0.35) + ')';
    ctx.fillRect(0, 0, vw, vh);
    F.flash--;
  }
}

/* ===================== §9.6 SCENE LOGIC ===================== */
function menuOk() { return EDGE.confirm || EDGE.lp || EDGE.hp || EDGE.lk || EDGE.hk || EDGE.sp; }
function tapHit(rects) {
  if (!menuTap) return -1;
  for (var i = 0; i < rects.length; i++) {
    var r = rects[i];
    if (menuTap.x >= r.x && menuTap.x <= r.x + r.w && menuTap.y >= r.y && menuTap.y <= r.y + r.h) return r.idx;
  }
  return -1;
}
// §16 phase transitions: cursor is (re)initialized from the persisted pick
// each time a phase is entered, so backing out and returning (Esc, or a
// later revisit to select) lands the cursor back on the last confirmed
// choice rather than resetting to 0 — this is what makes picks "persist
// across visits" feel right, not just survive in memory.
function enterSelectPhase(phase) {
  G.sel.phase = phase;
  if (phase === 0) {
    G.sel.cursor = Math.max(0, ROSTER.indexOf(G.sel.p1));
  } else if (phase === 1) {
    G.sel.cursor = G.sel.p2 === 'random' ? ROSTER.length : Math.max(0, ROSTER.indexOf(G.sel.p2));
  } else {
    G.sel.cursor = 0;
  }
}
function cycleStage(dir) {
  var i = STAGE_OPTS.indexOf(G.sel.stage);
  if (i < 0) i = 0;
  G.sel.stage = STAGE_OPTS[(i + dir + STAGE_OPTS.length) % STAGE_OPTS.length];
  S.uiMove();
}
function cycleDiff(dir) {
  var i = DIFF_OPTS.indexOf(G.sel.diff);
  if (i < 0) i = 1;
  G.sel.diff = DIFF_OPTS[(i + dir + DIFF_OPTS.length) % DIFF_OPTS.length];
  S.uiMove();
}
function confirmPhase0() {
  G.sel.p1 = ROSTER[G.sel.cursor];
  S.uiConfirm();
  enterSelectPhase(1);
}
function confirmPhase1() {
  G.sel.p2 = G.sel.cursor === ROSTER.length ? 'random' : ROSTER[G.sel.cursor];
  S.uiConfirm();
  enterSelectPhase(2);
}
function selPhase0Tick(tapped) {
  var n = ROSTER.length;
  if (tapped >= 0) {
    if (tapped === G.sel.cursor) confirmPhase0();
    else { G.sel.cursor = tapped; S.uiMove(); }
    return;
  }
  if (EDGE.pause) { G.scene = 'title'; S.uiConfirm(); return; }
  if (EDGE.left) { G.sel.cursor = (G.sel.cursor + n - 1) % n; S.uiMove(); }
  if (EDGE.right) { G.sel.cursor = (G.sel.cursor + 1) % n; S.uiMove(); }
  if (menuOk()) confirmPhase0();
}
function selPhase1Tick(tapped) {
  var n = ROSTER.length + 1; // + RANDOM card
  if (tapped >= 0) {
    if (tapped === G.sel.cursor) confirmPhase1();
    else { G.sel.cursor = tapped; S.uiMove(); }
    return;
  }
  if (EDGE.pause) { enterSelectPhase(0); S.uiMove(); return; }
  if (EDGE.left) { G.sel.cursor = (G.sel.cursor + n - 1) % n; S.uiMove(); }
  if (EDGE.right) { G.sel.cursor = (G.sel.cursor + 1) % n; S.uiMove(); }
  if (menuOk()) confirmPhase1();
}
function selPhase2Tick(tapped) {
  if (tapped >= 0) {
    if (tapped === 0) { G.sel.cursor = 0; S.uiMove(); }
    else if (tapped === 1) { G.sel.cursor = 0; cycleStage(-1); }
    else if (tapped === 2) { G.sel.cursor = 0; cycleStage(1); }
    else if (tapped === 3) { G.sel.cursor = 1; S.uiMove(); }
    else if (tapped === 4) { G.sel.cursor = 1; cycleDiff(-1); }
    else if (tapped === 5) { G.sel.cursor = 1; cycleDiff(1); }
    else if (tapped === 6) { G.sel.cursor = 2; startSelectedFight(); }
    return;
  }
  if (EDGE.pause) { enterSelectPhase(1); S.uiMove(); return; }
  if (EDGE.up) { G.sel.cursor = (G.sel.cursor + 2) % 3; S.uiMove(); }
  if (EDGE.down) { G.sel.cursor = (G.sel.cursor + 1) % 3; S.uiMove(); }
  if (EDGE.left || EDGE.right) {
    if (G.sel.cursor === 0) cycleStage(EDGE.right ? 1 : -1);
    else if (G.sel.cursor === 1) cycleDiff(EDGE.right ? 1 : -1);
  }
  if (menuOk()) {
    if (G.sel.cursor < 2) { G.sel.cursor++; S.uiMove(); }
    else startSelectedFight();
  }
}
function selectTick() {
  advanceCards();
  var tapped = tapHit(G.menuRects);
  if (G.sel.phase === 0) selPhase0Tick(tapped);
  else if (G.sel.phase === 1) selPhase1Tick(tapped);
  else selPhase2Tick(tapped);
}
function startSelectedFight() {
  var p1 = G.sel.p1;
  // RANDOM resolves with plain Math.random — never the AI's seeded RNG.
  var p2 = G.sel.p2 === 'random' ? ROSTER[Math.floor(Math.random() * ROSTER.length)] : G.sel.p2;
  var stage = G.sel.stage === 'random' ? STAGE_IDS[Math.floor(Math.random() * STAGE_IDS.length)] : G.sel.stage;
  G.charP1 = p1; G.charP2 = p2; G.stageId = stage; stageDirty = true;
  S.uiConfirm();
  newFight(G.sel.diff, false);
}
function pauseSnapPrev() {
  // entering pause freezes the sim but render(alpha) keeps lerping every rAF
  // with alpha oscillating (e.g. ~0/0.5 on 120 Hz): snap prev positions for
  // fighters, projectiles and particles so nothing buzzes behind the PAUSED
  // overlay — same defect class as the hitstop / endTick freeze snaps
  var F = G.fight;
  if (!F) return;
  setPrev(F);
  for (var i = 0; i < PMAX; i++) { pPX[i] = pX[i]; pPY[i] = pY[i]; }
  // §17.3 market steam wisps aren't in the particle pool — snap them too
  for (var wi2 = 0; wi2 < WISP_N; wi2++) { wispPX[wi2] = wispX[wi2]; wispPY[wi2] = wispY[wi2]; }
}
function togglePause() {
  if (!G.paused) {
    G.paused = true; G.pauseIdx = 0;
    pauseSnapPrev();
    musicStop(); S.uiConfirm();
    if (AC && musicBus) { try { musicBus.gain.value = 0.03; } catch (e) {} }
  } else resumeFight();
}
function resumeFight() {
  G.paused = false;
  if (AC) {
    try { musicBus.gain.value = 0.28; } catch (e) {}
    if (AC.state !== 'running') {
      // resume() is async — play the confirm blip once audio is actually live
      try {
        var pr = AC.resume();
        if (pr && pr.then) pr.then(function () { S.uiConfirm(); }, function () {});
        else S.uiConfirm();
      } catch (e) {}
    } else S.uiConfirm();
  }
  musicStart(true);
}
function pauseTick() {
  var tapped = tapHit(G.menuRects);
  if (tapped >= 0) { G.pauseIdx = tapped; pauseAction(); return; }
  if (EDGE.up) { G.pauseIdx = (G.pauseIdx + 3) % 4; S.uiMove(); }
  if (EDGE.down) { G.pauseIdx = (G.pauseIdx + 1) % 4; S.uiMove(); }
  if (menuOk()) pauseAction();
}
function pauseAction() {
  switch (G.pauseIdx) {
    case 0: resumeFight(); break;
    case 1: G.paused = false; newFight(G.difficulty, false); break;
    case 2: setMuted(!muted); S.uiMove(); break;
    case 3:
      G.paused = false; G.scene = 'title'; G.cards.length = 0;
      musicStart(false); S.uiConfirm();
      break;
  }
}
function victoryTick() {
  advanceCards();
  particlesTick(1); // let leftover KO sparks/dust finish instead of freezing
  var tapped = tapHit(G.menuRects);
  if (tapped >= 0) { G.menuIdx = tapped; victoryAction(); return; }
  if (EDGE.up) { G.menuIdx = (G.menuIdx + 2) % 3; S.uiMove(); }
  if (EDGE.down) { G.menuIdx = (G.menuIdx + 1) % 3; S.uiMove(); }
  if (menuOk()) victoryAction();
}
function victoryAction() {
  switch (G.menuIdx) {
    case 0: S.uiConfirm(); newFight(G.difficulty || 'medium', false); break;
    case 1: G.scene = 'select'; enterSelectPhase(0); S.uiConfirm(); break;
    case 2: G.scene = 'title'; S.uiConfirm(); break;
  }
}
function logicTick() {
  G.titleT++;
  if (EDGE.mute) setMuted(!muted);
  switch (G.scene) {
    case 'title':
      advanceCards();
      if (EDGE.any || menuTap) {
        G.scene = 'select'; enterSelectPhase(0);
        S.uiConfirm();
        if (!MUS.on) musicStart(false);
      }
      break;
    case 'select': selectTick(); break;
    case 'fight':
      if (EDGE.pause) togglePause();
      else if (G.paused) pauseTick();
      else fightTick();
      break;
    case 'victory': victoryTick(); break;
  }
  clearEdges();
}

/* ===================== §4 GAME LOOP + §12 PERF VALVE ===================== */
var lastNow = performance.now(), accum = 0;
var ftAvg = 8, slowSince = 0;
/* §12.7 degradation valve — fed the measured WORK time of logic+render, never
   the rAF interval: 30 Hz Low Power Mode cadence or a rAF gap (Control Center,
   tab switch) must not read as "device too slow" and permanently soften dpr. */
function perfValve(now, workMs) {
  if (dprForced) return; // never oscillate back
  ftAvg += (workMs - ftAvg) / 60;
  if (ftAvg > 19) {
    if (!slowSince) slowSince = now;
    else if (now - slowSince > 2000) { dprForced = 1; relayout(); }
  } else slowSince = 0;
}
function loop(now) {
  requestAnimationFrame(loop);
  var dt = now - lastNow;
  accum += Math.min(dt, 100);
  lastNow = now;
  var t0 = performance.now();
  var steps = 0;
  while (accum >= STEP && steps < 4) {
    logicTick();
    accum -= STEP;
    steps++;
  }
  if (steps === 4) accum = 0;
  render(accum / STEP);
  perfValve(now, performance.now() - t0);
}

/* ===================== TESTING CONTRACT: window.__SF ===================== */
/* §21 v2 extensions (TESTING.md §1), backward compatible: every v1 field
   keeps its exact name/type/semantics. New this milestone: p1.char/p2.char,
   state().stage/roster/stages/select, start(difficulty, opts?). */
var SF_EMPTY_P = { hp: 0, maxHp: MAXHP, x: 0, y: 0, facing: 1, action: 'none', char: null };
window.__SF = {
  version: '2.0.0',
  state: function () {
    try {
      var F = G.fight;
      function mk(p) {
        if (!p) return { hp: 0, maxHp: MAXHP, x: 0, y: 0, facing: 1, action: 'none', char: null };
        return { hp: p.hp, maxHp: CHARACTERS[p.charId].maxHp, x: p.x, y: p.y, facing: p.facing, action: p.state, char: p.charId };
      }
      var scene = 'title';
      if (G.scene === 'select') scene = 'select';
      else if (G.scene === 'fight') scene = (F && F.phase === 'end') ? 'roundEnd' : 'fight';
      else if (G.scene === 'victory') scene = 'matchEnd';
      return {
        scene: scene,
        paused: !!G.paused,
        muted: !!muted,
        difficulty: G.difficulty,
        round: F ? F.round : 0,
        timer: F ? Math.max(0, Math.ceil(F.timerF / 60)) : 0,
        roundWins: F ? [F.wins[0], F.wins[1]] : [0, 0],
        p1: mk(F && F.p1),
        p2: mk(F && F.p2),
        touchControlsVisible: touchVisible(),
        stage: F ? G.stageId : null,
        roster: ROSTER.slice(),
        stages: STAGE_IDS.slice(),
        // (v2/milestone 4) real three-phase select state — non-null only
        // while scene === 'select'; per TESTING.md §1 this deliberately omits
        // `diff` (G.sel carries it internally for startSelectedFight, but the
        // contract only promises phase/cursor/p1/p2/stage).
        select: G.scene === 'select'
          ? { phase: G.sel.phase, cursor: G.sel.cursor, p1: G.sel.p1, p2: G.sel.p2, stage: G.sel.stage }
          : null
      };
    } catch (e) {
      return {
        scene: 'title', paused: false, muted: false, difficulty: null, round: 0,
        timer: 0, roundWins: [0, 0], p1: SF_EMPTY_P, p2: SF_EMPTY_P, touchControlsVisible: false,
        stage: null, roster: ROSTER.slice(), stages: STAGE_IDS.slice(), select: null
      };
    }
  },
  // (v2) opts is optional: { p1?, p2?, stage? }. Unrecognized/missing values
  // silently fall back to kazan/volt/harbor — no console output.
  start: function (difficulty, opts) {
    var d = difficulty === 'easy' || difficulty === 'hard' ? difficulty : 'medium';
    var o = opts || {};
    var p1 = (typeof o.p1 === 'string' && ROSTER.indexOf(o.p1) >= 0) ? o.p1 : 'kazan';
    var p2 = (typeof o.p2 === 'string' && ROSTER.indexOf(o.p2) >= 0) ? o.p2 : 'volt';
    var stage = (typeof o.stage === 'string' && STAGE_IDS.indexOf(o.stage) >= 0) ? o.stage : 'harbor';
    G.paused = false;
    G.charP1 = p1; G.charP2 = p2; G.stageId = stage; stageDirty = true; // §17.1/§17.4 stage switch
    newFight(d, true);
  },
  setAI: function (enabled) { G.aiOn = !!enabled; },
  aiDebug: function () {
    var F = G.fight;
    if (!F || !F.ai) return null;
    var a = F.ai;
    return { pressN: a.pressN, chainG: !!a.chainG, blockedRow: a.blockedRow,
             openHoldT: a.openHoldT, counterMv: a.counterMv, plans: a.dbgPlan,
             fires: a.dbgFire, pressCount: a.dbgPress, passiveT: a.passiveT };
  },
  setHP: function (player, hp) {
    var F = G.fight;
    if (!F) return;
    var f = player === 1 ? F.p1 : F.p2;
    f.hp = clamp(Math.round(hp), 0, CHARACTERS[f.charId].maxHp);
    if (f.ghost < f.hp) f.ghost = f.hp;
    if (f.hp <= 0 && F.phase === 'play') {
      var att = player === 1 ? F.p2 : F.p1;
      F.koPending.push({ def: f, att: att });
      processKO(F);
    }
  },
  setTimer: function (seconds) {
    if (G.fight) {
      G.fight.timerF = Math.max(0, Math.round(seconds * 60));
      G.fight.lastSec = Math.ceil(G.fight.timerF / 60);
    }
  }
};

/* ===================== BOOT ===================== */
buildAnims();
makePreviews();
relayout();
updateTouchVisibility();
requestAnimationFrame(loop);

</script>
